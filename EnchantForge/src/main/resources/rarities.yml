  LEGENDARY:
    display: "<gradient:#FFD700:#FF6B35>Legendary"
    color: "<gold>"
    weight: 10
    success-rate-modifier: 0.55
    destroy-rate-modifier: 1.50
    glow: true

  MYTHIC:
    display: "<gradient:#FF0000:#FF69B4>Mythic"
