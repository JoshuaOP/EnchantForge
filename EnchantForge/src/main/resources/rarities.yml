# ============================================================
#                   EnchantForge Rarities
# ============================================================

rarities:
  COMMON:
    display: "<white>Common"
    color: "<white>"
    weight: 100
    success-rate-modifier: 1.0
    destroy-rate-modifier: 1.0
    glow: false

  UNCOMMON:
    display: "<green>Uncommon"
    color: "<green>"
    weight: 75
    success-rate-modifier: 0.95
    destroy-rate-modifier: 1.05
    glow: false

  RARE:
    display: "<aqua>Rare"
    color: "<aqua>"
    weight: 50
    success-rate-modifier: 0.85
    destroy-rate-modifier: 1.15
